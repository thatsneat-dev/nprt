name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "!docs/release-notes-*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: write

jobs:
  verify:
    if: ${{ !github.event.pull_request.draft }}
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-last-accessed: P1DT12H
          purge-primary-key: never

      - name: Version bump check
        id: version_check
        if: always()
        env:
          BASE_BRANCH: ${{ github.event.pull_request.base.ref || 'main' }}
        run: nix develop -c make version-check BASE_BRANCH="$BASE_BRANCH"

      - name: Release notes check
        id: release_notes_check
        if: always()
        run: nix develop -c make release-notes-check

      - name: Flake check
        id: flake_check
        if: always()
        run: nix flake check --no-build

      - name: Formatting
        id: fmt_check
        if: always()
        run: nix develop -c make format-check

      - name: Vet
        id: vet
        if: always()
        run: nix develop -c go vet ./...

      - name: Lint
        id: lint
        if: always()
        run: nix develop -c golangci-lint run ./...

      - name: Vulnerability check
        id: vuln
        if: always()
        run: nix develop -c nix shell nixpkgs#govulncheck -c govulncheck ./...

      - name: Build (Nix)
        id: build
        if: always()
        run: nix build --print-build-logs

      - name: Tests
        id: tests
        if: always()
        run: |
          nix develop -c bash -c '
            set -o pipefail
            go install github.com/jstemmer/go-junit-report/v2@latest
            go test -v ./... 2>&1 | "$(go env GOPATH)/bin/go-junit-report" -set-exit-code -iocopy -out test-results.xml
          '

      - name: Publish test results
        id: junit
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results.xml
          detailed_summary: true
          fail_on_failure: true
          require_tests: true

      - name: CI summary
        if: always()
        env:
          OUTCOME_VERSION: ${{ steps.version_check.outcome }}
          OUTCOME_RELEASE_NOTES: ${{ steps.release_notes_check.outcome }}
          OUTCOME_FLAKE: ${{ steps.flake_check.outcome }}
          OUTCOME_FMT: ${{ steps.fmt_check.outcome }}
          OUTCOME_VET: ${{ steps.vet.outcome }}
          OUTCOME_LINT: ${{ steps.lint.outcome }}
          OUTCOME_VULN: ${{ steps.vuln.outcome }}
          OUTCOME_BUILD: ${{ steps.build.outcome }}
          OUTCOME_TESTS: ${{ steps.tests.outcome }}
          OUTCOME_JUNIT: ${{ steps.junit.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          icon() {
            case "$1" in
              success) echo "✅ passed" ;;
              failure) echo "❌ failed" ;;
              cancelled) echo "🚫 cancelled" ;;
              skipped) echo "⏭️ skipped" ;;
              *) echo "➖ $1" ;;
            esac
          }

          {
            echo "## CI Results"
            echo ""
            echo "**Runner:** \`${{ runner.os }}\` (\`${{ runner.arch }}\`)  "
            echo "**Commit:** \`${{ github.event.pull_request.head.sha || github.sha }}\`  "
            echo "**Trigger:** \`${{ github.event_name }}\` on \`${{ github.ref_name }}\`  "
            echo "**Run:** [#${{ github.run_number }}](${RUN_URL})"
            echo ""
            echo "| Stage | Result | Details |"
            echo "| --- | --- | --- |"
            echo "| Version bump check | $(icon "$OUTCOME_VERSION") | \`make version-check\` |"
            echo "| Release notes check | $(icon "$OUTCOME_RELEASE_NOTES") | \`make release-notes-check\` |"
            echo "| Flake check | $(icon "$OUTCOME_FLAKE") | \`nix flake check --no-build\` |"
            echo "| Formatting | $(icon "$OUTCOME_FMT") | \`make format-check\` |"
            echo "| Vet | $(icon "$OUTCOME_VET") | \`go vet ./...\` |"
            echo "| Lint | $(icon "$OUTCOME_LINT") | \`golangci-lint run ./...\` |"
            echo "| Vulnerability check | $(icon "$OUTCOME_VULN") | \`govulncheck ./...\` |"
            echo "| Build (Nix) | $(icon "$OUTCOME_BUILD") | \`nix build\` |"
            echo "| Tests | $(icon "$OUTCOME_TESTS") | \`go test ./...\` |"
            echo "| JUnit report | $(icon "$OUTCOME_JUNIT") | \`test-results.xml\` |"
            echo ""
            echo "_Overall job status: **${{ job.status }}**_"
          } | tee -a "$GITHUB_STEP_SUMMARY" > ci-summary.md

      - name: Comment PR with CI summary
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: ci-summary
          path: ci-summary.md
